<svg width="1080" height="1920" viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1920" fill="#F3F4F6"/>

  <!-- Header with gradient -->
  <rect width="1080" height="420" fill="url(#headerGrad)"/>

  <!-- Status bar -->
  <text x="80" y="50" font-family="Arial" font-size="24" font-weight="600" fill="white">9:41</text>
  <text x="920" y="50" font-family="Arial" font-size="22" fill="white">●●● WiFi 🔋</text>

  <!-- Back button -->
  <text x="60" y="130" font-family="Arial" font-size="36" fill="white">←</text>
  <text x="540" y="135" font-family="Arial" font-size="32" font-weight="700" fill="white" text-anchor="middle">Walker Profile</text>

  <!-- Avatar -->
  <circle cx="540" cy="300" r="100" fill="white" opacity="0.2"/>
  <circle cx="540" cy="275" r="50" fill="white"/>
  <ellipse cx="540" cy="350" rx="75" ry="45" fill="white"/>

  <!-- White card overlapping header -->
  <rect x="0" y="390" width="1080" height="1530" rx="40" fill="white"/>

  <!-- Name and rating -->
  <text x="540" y="490" font-family="Arial" font-size="48" font-weight="800" fill="#1F2937" text-anchor="middle">Sarah Mitchell</text>
  <text x="540" y="545" font-family="Arial" font-size="28" fill="#6B7280" text-anchor="middle">Professional Dog Walker · Sydney, AU</text>
  <text x="540" y="600" font-family="Arial" font-size="32" fill="#F59E0B" text-anchor="middle">★★★★★  4.9  (128 reviews)</text>

  <!-- Stats row -->
  <rect x="60" y="635" width="280" height="120" rx="20" fill="#EEF2FF" filter="url(#cardShadow)"/>
  <text x="200" y="695" font-family="Arial" font-size="42" font-weight="800" fill="#6366F1" text-anchor="middle">128</text>
  <text x="200" y="735" font-family="Arial" font-size="24" fill="#6B7280" text-anchor="middle">Walks Done</text>

  <rect x="400" y="635" width="280" height="120" rx="20" fill="#FDF2F8" filter="url(#cardShadow)"/>
  <text x="540" y="695" font-family="Arial" font-size="42" font-weight="800" fill="#EC4899" text-anchor="middle">3 yrs</text>
  <text x="540" y="735" font-family="Arial" font-size="24" fill="#6B7280" text-anchor="middle">Experience</text>

  <rect x="740" y="635" width="280" height="120" rx="20" fill="#F0FDF4" filter="url(#cardShadow)"/>
  <text x="880" y="695" font-family="Arial" font-size="42" font-weight="800" fill="#10B981" text-anchor="middle">$25</text>
  <text x="880" y="735" font-family="Arial" font-size="24" fill="#6B7280" text-anchor="middle">Per Walk</text>

  <!-- About section -->
  <text x="60" y="820" font-family="Arial" font-size="34" font-weight="700" fill="#1F2937">About</text>
  <text x="60" y="868" font-family="Arial" font-size="26" fill="#6B7280">Passionate dog lover with 3+ years of professional</text>
  <text x="60" y="906" font-family="Arial" font-size="26" fill="#6B7280">walking experience. I treat every dog like my own!</text>
  <text x="60" y="944" font-family="Arial" font-size="26" fill="#6B7280">Certified in pet first aid. Available 7 days a week.</text>

  <!-- Services -->
  <text x="60" y="1010" font-family="Arial" font-size="34" font-weight="700" fill="#1F2937">Services</text>
  <rect x="60" y="1030" width="220" height="60" rx="30" fill="#EEF2FF"/>
  <text x="170" y="1068" font-family="Arial" font-size="24" fill="#6366F1" text-anchor="middle">🐾 Solo Walk</text>
  <rect x="300" y="1030" width="240" height="60" rx="30" fill="#EEF2FF"/>
  <text x="420" y="1068" font-family="Arial" font-size="24" fill="#6366F1" text-anchor="middle">👥 Group Walk</text>
  <rect x="560" y="1030" width="220" height="60" rx="30" fill="#EEF2FF"/>
  <text x="670" y="1068" font-family="Arial" font-size="24" fill="#6366F1" text-anchor="middle">🏠 Pet Sitting</text>

  <!-- Reviews -->
  <text x="60" y="1160" font-family="Arial" font-size="34" font-weight="700" fill="#1F2937">Recent Reviews</text>

  <rect x="60" y="1190" width="960" height="160" rx="20" fill="#F9FAFB" filter="url(#cardShadow)"/>
  <circle cx="120" cy="1250" r="38" fill="#E0E7FF"/>
  <text x="120" y="1258" font-family="Arial" font-size="22" fill="#6366F1" text-anchor="middle">JD</text>
  <text x="180" y="1240" font-family="Arial" font-size="26" font-weight="600" fill="#1F2937">John D.</text>
  <text x="180" y="1278" font-family="Arial" font-size="24" fill="#F59E0B">★★★★★</text>
  <text x="180" y="1318" font-family="Arial" font-size="24" fill="#6B7280">"Amazing walker! My dog Max loves her."</text>

  <rect x="60" y="1370" width="960" height="160" rx="20" fill="#F9FAFB" filter="url(#cardShadow)"/>
  <circle cx="120" cy="1430" r="38" fill="#FCE7F3"/>
  <text x="120" y="1438" font-family="Arial" font-size="22" fill="#EC4899" text-anchor="middle">SL</text>
  <text x="180" y="1420" font-family="Arial" font-size="26" font-weight="600" fill="#1F2937">Sophie L.</text>
  <text x="180" y="1458" font-family="Arial" font-size="24" fill="#F59E0B">★★★★★</text>
  <text x="180" y="1498" font-family="Arial" font-size="24" fill="#6B7280">"Super reliable and sends updates every walk."</text>

  <!-- Book button -->
  <rect x="60" y="1600" width="960" height="90" rx="45" fill="url(#headerGrad)" filter="url(#cardShadow)"/>
  <text x="540" y="1655" font-family="Arial" font-size="34" font-weight="700" fill="white" text-anchor="middle">Book a Walk — $25</text>

  <!-- Message button -->
  <rect x="60" y="1710" width="460" height="80" rx="40" fill="#EEF2FF"/>
  <text x="290" y="1758" font-family="Arial" font-size="30" font-weight="600" fill="#6366F1" text-anchor="middle">💬 Message</text>
  <rect x="560" y="1710" width="460" height="80" rx="40" fill="#EEF2FF"/>
  <text x="790" y="1758" font-family="Arial" font-size="30" font-weight="600" fill="#6366F1" text-anchor="middle">📞 Call</text>
</svg>
