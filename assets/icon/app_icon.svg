<svg width="1024" height="1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#gradient)" rx="180"/>

  <!-- Paw Print (White) - Realistic design with separated pads -->
  <g transform="translate(512, 532)" fill="#FFFFFF">
    <!-- Main Pad (bottom, heart-like shape) -->
    <path d="M0,180
             C-80,180 -140,120 -140,50
             C-140,-20 -80,-60 -40,-60
             C-20,-60 0,-40 0,-20
             C0,-40 20,-60 40,-60
             C80,-60 140,-20 140,50
             C140,120 80,180 0,180 Z"/>

    <!-- Toe Pads (4 separate ovals with clear gaps) -->
    <!-- Left outer toe -->
    <ellipse cx="-125" cy="-115" rx="45" ry="55" transform="rotate(-20 -125 -115)"/>

    <!-- Left inner toe -->
    <ellipse cx="-42" cy="-155" rx="42" ry="52" transform="rotate(-5 -42 -155)"/>

    <!-- Right inner toe -->
    <ellipse cx="42" cy="-155" rx="42" ry="52" transform="rotate(5 42 -155)"/>

    <!-- Right outer toe -->
    <ellipse cx="125" cy="-115" rx="45" ry="55" transform="rotate(20 125 -115)"/>
  </g>
</svg>
